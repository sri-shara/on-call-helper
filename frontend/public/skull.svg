  <rect x="8" y="27" width="8" height="13" rx="3.5" fill="#e8a0bf" stroke="#c97a9e" stroke-width="0.5"/>
  <rect x="10" y="29" width="3" height="9" rx="1.5" fill="#f5c6d8"/>
