  <rect x="47" y="26" width="10" height="15" rx="4" fill="#1a1a1a"/>
  <rect x="48" y="27" width="8" height="13" rx="3.5" fill="#e8a0bf" stroke="#c97a9e" stroke-width="0.5"/>
  <rect x="51" y="29" width="3" height="9" rx="1.5" fill="#f5c6d8"/>
