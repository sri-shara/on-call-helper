  <rect x="23" y="44" width="3.2" height="4.5" rx="0.5" fill="#f8d0e0" stroke="#1a1a1a" stroke-width="0.6"/>
  <rect x="26.8" y="44" width="3.2" height="4.5" rx="0.5" fill="#f8d0e0" stroke="#1a1a1a" stroke-width="0.6"/>
