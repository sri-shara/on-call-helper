# On Call Helper - Docker Compose
# Full stack: Backend API + React Dashboard

version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO}
      - PAGERDUTY_ROUTING_KEY=${PAGERDUTY_ROUTING_KEY}
      - CODERABBIT_API_KEY=${CODERABBIT_API_KEY}
      - NUCLEUS_REPO_PATH=/repos/nucleus
      - ONCALL_REPO_PATH=/repos/oncall
    volumes:
      # Mount repositories for access
      - ${NUCLEUS_REPO_PATH:-/Users/sri/nucleus}:/repos/nucleus:ro
      - ${ONCALL_REPO_PATH:-/Users/sri/oncall}:/repos/oncall:ro
      # Mount GCP credentials if needed
      - ${GCP_CREDENTIALS_PATH:-./credentials.json}:/app/credentials.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - oncall-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - oncall-network

networks:
  oncall-network:
    name: oncall-helper-network
